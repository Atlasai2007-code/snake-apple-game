<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Snake & Apple" />
  <meta name="theme-color" content="#0f172a" />
  <title>Snake & Apple</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #ef4444;
      --grid: #1e293b;
      --snake: #22c55e;
      --snake-head: #86efac;
      --apple: #fb7185;
      --btn: #334155;
      --btn-active: #475569;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }

    .topbar {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      background: var(--panel-2);
      border-radius: 14px;
      padding: 10px 12px;
      min-width: 74px;
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .board-wrap {
      padding: 14px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #0b1220, #111827);
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      image-rendering: pixelated;
    }

    .controls {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      user-select: none;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      background: var(--btn);
      color: var(--text);
      min-height: 58px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.97);
      background: var(--btn-active);
    }

    .blank { visibility: hidden; }

    .actions {
      display: flex;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .action {
      flex: 1;
      border: 0;
      border-radius: 16px;
      min-height: 52px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: #052e16; }
    .secondary { background: #f1f5f9; color: #0f172a; }

    .info {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .pill {
      display: inline-block;
      background: rgba(34, 197, 94, 0.14);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.22);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      margin-bottom: 10px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .board-shell {
      position: relative;
    }

    .message {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 14px 16px;
      text-align: center;
      max-width: 80%;
    }

    .message strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card topbar">
      <div class="title-wrap">
        <h1>Snake & Apple</h1>
        <p>Built for mobile. Swipe or tap the arrows.</p>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-label">Score</span><strong id="score">0</strong></div>
        <div class="stat"><span class="stat-label">Best</span><strong id="best">0</strong></div>
      </div>
    </div>

    <div class="card board-wrap">
      <div class="board-shell">
        <canvas id="game" width="420" height="420"></canvas>
        <div class="overlay" id="overlay">
          <div class="message" id="messageBox">
            <strong>Tap Start</strong>
            <span>Eat apples. Don’t hit the wall or yourself.</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="actions">
        <button class="action primary" id="startBtn">Start / Restart</button>
        <button class="action secondary" id="pauseBtn">Pause</button>
      </div>
      <div class="controls">
        <div class="blank btn"></div>
        <button class="btn" data-dir="up">▲</button>
        <div class="blank btn"></div>
        <button class="btn" data-dir="left">◀</button>
        <button class="btn" data-dir="down">▼</button>
        <button class="btn" data-dir="right">▶</button>
      </div>
      <div class="info">
        <div class="pill">Phone friendly</div><br />
        Controls: swipe on the board, tap arrows, or use keyboard arrows if you open it on desktop.
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const gridCount = 14;
    const tileSize = canvas.width / gridCount;
    const storageKey = 'snakeAppleBestScore';

    let snake;
    let dir;
    let nextDir;
    let apple;
    let score;
    let loop;
    let speed;
    let running = false;
    let paused = false;
    let touchStartX = 0;
    let touchStartY = 0;

    function loadBest() {
      return Number(localStorage.getItem(storageKey) || 0);
    }

    function saveBest(value) {
      localStorage.setItem(storageKey, String(value));
    }

    function updateScore() {
      scoreEl.textContent = score;
      const best = Math.max(loadBest(), score);
      bestEl.textContent = best;
      if (best !== loadBest()) saveBest(best);
    }

    function randomCell() {
      return Math.floor(Math.random() * gridCount);
    }

    function placeApple() {
      let candidate;
      do {
        candidate = { x: randomCell(), y: randomCell() };
      } while (snake.some(part => part.x === candidate.x && part.y === candidate.y));
      apple = candidate;
    }

    function showMessage(title, text) {
      overlay.style.display = 'flex';
      messageBox.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
    }

    function hideMessage() {
      overlay.style.display = 'none';
    }

    function resetGame() {
      snake = [
        { x: 6, y: 7 },
        { x: 5, y: 7 },
        { x: 4, y: 7 }
      ];
      dir = 'right';
      nextDir = 'right';
      score = 0;
      speed = 180;
      paused = false;
      pauseBtn.textContent = 'Pause';
      placeApple();
      updateScore();
      draw();
    }

    function startGame() {
      resetGame();
      running = true;
      hideMessage();
      clearInterval(loop);
      loop = setInterval(step, speed);
    }

    function endGame() {
      running = false;
      clearInterval(loop);
      showMessage('Game Over', `Score: ${score}. Tap Start / Restart to play again.`);
    }

    function setDirection(newDir) {
      const opposite = {
        up: 'down',
        down: 'up',
        left: 'right',
        right: 'left'
      };
      if (newDir !== opposite[dir]) nextDir = newDir;
    }

    function step() {
      if (!running || paused) return;

      dir = nextDir;
      const head = { ...snake[0] };
      if (dir === 'up') head.y -= 1;
      if (dir === 'down') head.y += 1;
      if (dir === 'left') head.x -= 1;
      if (dir === 'right') head.x += 1;

      const hitWall = head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);
      if (hitWall || hitSelf) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === apple.x && head.y === apple.y) {
        score += 1;
        updateScore();
        placeApple();
        if (speed > 90) {
          speed -= 6;
          clearInterval(loop);
          loop = setInterval(step, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridCount; i++) {
        const p = i * tileSize;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function roundRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      const ax = apple.x * tileSize;
      const ay = apple.y * tileSize;
      roundRect(ax + 8, ay + 8, tileSize - 16, tileSize - 16, 10, '#fb7185');
      ctx.fillStyle = '#86efac';
      ctx.beginPath();
      ctx.arc(ax + tileSize * 0.62, ay + tileSize * 0.28, 4, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((part, index) => {
        const x = part.x * tileSize;
        const y = part.y * tileSize;
        roundRect(x + 4, y + 4, tileSize - 8, tileSize - 8, 10, index === 0 ? '#86efac' : '#22c55e');
        if (index === 0) {
          ctx.fillStyle = '#052e16';
          const eyeY = y + tileSize * 0.38;
          ctx.beginPath();
          ctx.arc(x + tileSize * 0.34, eyeY, 3, 0, Math.PI * 2);
          ctx.arc(x + tileSize * 0.66, eyeY, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    document.addEventListener('keydown', (e) => {
      const map = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right'
      };
      if (map[e.key]) {
        e.preventDefault();
        setDirection(map[e.key]);
      }
      if (e.key === ' ') {
        e.preventDefault();
        if (!running) startGame();
        else togglePause();
      }
    });

    document.querySelectorAll('[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => setDirection(btn.dataset.dir));
    });

    function togglePause() {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
      if (paused) showMessage('Paused', 'Tap Resume to keep going.');
      else hideMessage();
    }

    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);

    canvas.addEventListener('touchstart', (e) => {
      const touch = e.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      const threshold = 20;
      if (Math.max(absX, absY) < threshold) return;
      if (absX > absY) setDirection(dx > 0 ? 'right' : 'left');
      else setDirection(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    bestEl.textContent = loadBest();
    resetGame();
    showMessage('Tap Start', 'Eat apples. Don’t hit the wall or yourself.');
  </script>
</body>
</html>
