<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Snake & Apple" />
  <meta name="theme-color" content="#0b1020" />
  <title>Snake & Apple</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0d172a;
      --panel: rgba(11, 16, 32, 0.82);
      --line: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #9fb0cf;
      --green: #32d27a;
      --green2: #1daa61;
      --green3: #9af7bf;
      --red: #ff5f7a;
      --red2: #ff8b9f;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(50,210,122,0.08), transparent 25%),
        radial-gradient(circle at bottom, rgba(87,126,255,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      padding: 14px;
      display: flex;
      justify-content: center;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      max-width: 470px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .topbar {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat {
      min-width: 78px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 4px;
    }

    .stat strong { font-size: 1.15rem; }

    .board-wrap { padding: 14px; }
    .board-shell {
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #0b1326, #111a31);
    }

    canvas {
      width: 100%;
      display: block;
      aspect-ratio: 1;
      image-rendering: auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      pointer-events: none;
    }

    .message {
      background: rgba(7,17,31,0.72);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px 16px;
      border-radius: 18px;
      text-align: center;
      backdrop-filter: blur(12px);
      max-width: 86%;
    }

    .message strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 5px;
    }

    .controls { padding: 0 14px 14px; }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .action {
      flex: 1;
      min-height: 52px;
      border-radius: 16px;
      font-weight: 800;
    }

    .start { background: linear-gradient(135deg, var(--green3), var(--green)); color: #052814; }
    .pause { background: rgba(255,255,255,0.08); color: var(--text); }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .dpad button, .dpad .empty {
      min-height: 60px;
      border-radius: 18px;
    }

    .dpad button {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .dpad button:active, .action:active { transform: scale(0.98); }
    .empty { visibility: hidden; }

    .footer {
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      color: #b7ffd5;
      background: rgba(50,210,122,0.12);
      border: 1px solid rgba(50,210,122,0.18);
      font-size: 0.78rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card topbar">
      <div>
        <h1>Snake & Apple</h1>
        <div class="subtitle">Smoother, cleaner, and better on mobile.</div>
      </div>
      <div class="stats">
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Best</span><strong id="best">0</strong></div>
      </div>
    </div>

    <div class="card board-wrap">
      <div class="board-shell">
        <canvas id="game" width="720" height="720"></canvas>
        <div class="overlay" id="overlay">
          <div class="message" id="messageBox">
            <strong>Tap Start</strong>
            <span>Swipe or use the arrows. Eat apples. Don’t crash.</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card controls">
      <div class="actions">
        <button class="action start" id="startBtn">Start / Restart</button>
        <button class="action pause" id="pauseBtn">Pause</button>
      </div>
      <div class="dpad">
        <div class="empty"></div>
        <button data-dir="up">▲</button>
        <div class="empty"></div>
        <button data-dir="left">◀</button>
        <button data-dir="down">▼</button>
        <button data-dir="right">▶</button>
      </div>
      <div class="footer">
        <div class="badge">Safari + Home Screen friendly</div><br>
        Swipe on the board or tap the arrows. Add it to your Home Screen if you want it to feel like an app.
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const grid = 14;
    const size = canvas.width / grid;
    const bestKey = 'snakeAppleBestScoreV2';

    let snake = [];
    let direction = { x: 1, y: 0 };
    let queuedDirection = { x: 1, y: 0 };
    let apple = { x: 10, y: 10 };
    let score = 0;
    let running = false;
    let paused = false;
    let lastTime = 0;
    let moveAccumulator = 0;
    let stepMs = 145;
    let touchStartX = 0;
    let touchStartY = 0;

    function loadBest() { return Number(localStorage.getItem(bestKey) || 0); }
    function saveBest(v) { localStorage.setItem(bestKey, String(v)); }

    function updateScore() {
      scoreEl.textContent = score;
      const best = Math.max(loadBest(), score);
      bestEl.textContent = best;
      if (best !== loadBest()) saveBest(best);
    }

    function rand(max) { return Math.floor(Math.random() * max); }

    function placeApple() {
      do {
        apple = { x: rand(grid), y: rand(grid) };
      } while (snake.some(s => s.x === apple.x && s.y === apple.y));
    }

    function setMessage(title, text) {
      overlay.style.display = 'flex';
      messageBox.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
    }
    function hideMessage() { overlay.style.display = 'none'; }

    function resetGame() {
      snake = [
        { x: 5, y: 7 },
        { x: 4, y: 7 },
        { x: 3, y: 7 },
        { x: 2, y: 7 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = { x: 1, y: 0 };
      score = 0;
      stepMs = 145;
      paused = false;
      running = false;
      moveAccumulator = 0;
      pauseBtn.textContent = 'Pause';
      placeApple();
      updateScore();
      draw();
    }

    function startGame() {
      resetGame();
      running = true;
      hideMessage();
    }

    function endGame() {
      running = false;
      setMessage('Game Over', `Score: ${score}. Tap Start / Restart to go again.`);
    }

    function setDirection(name) {
      const map = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };
      const next = map[name];
      if (!next) return;
      if (next.x === -direction.x && next.y === -direction.y) return;
      queuedDirection = next;
    }

    function moveSnake() {
      direction = queuedDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      const hitWall = head.x < 0 || head.y < 0 || head.x >= grid || head.y >= grid;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);
      if (hitWall || hitSelf) return endGame();

      snake.unshift(head);
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        updateScore();
        placeApple();
        stepMs = Math.max(90, stepMs - 4);
      } else {
        snake.pop();
      }
    }

    function roundedRect(x, y, w, h, r, fill) {
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#0a1223');
      g.addColorStop(1, '#101b33');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i++) {
        const p = i * size;
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(canvas.width, p); ctx.stroke();
      }
    }

    function cellCenter(part) {
      return { x: part.x * size + size / 2, y: part.y * size + size / 2 };
    }

    function drawSnake() {
      if (!snake.length) return;

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#27c86e';
      ctx.lineWidth = size * 0.72;
      ctx.shadowColor = 'rgba(50,210,122,0.28)';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      snake.forEach((part, i) => {
        const c = cellCenter(part);
        if (i === 0) ctx.moveTo(c.x, c.y);
        else ctx.lineTo(c.x, c.y);
      });
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#9af7bf';
      ctx.lineWidth = size * 0.34;
      ctx.beginPath();
      snake.forEach((part, i) => {
        const c = cellCenter(part);
        if (i === 0) ctx.moveTo(c.x, c.y);
        else ctx.lineTo(c.x, c.y);
      });
      ctx.stroke();
      ctx.restore();

      const head = snake[0];
      const hx = head.x * size + size / 2;
      const hy = head.y * size + size / 2;
      const radius = size * 0.34;

      const headGradient = ctx.createRadialGradient(hx - radius * 0.35, hy - radius * 0.35, radius * 0.15, hx, hy, radius);
      headGradient.addColorStop(0, '#c8ffd9');
      headGradient.addColorStop(1, '#34d37c');
      ctx.fillStyle = headGradient;
      ctx.beginPath();
      ctx.arc(hx, hy, radius, 0, Math.PI * 2);
      ctx.fill();

      let angle = 0;
      if (direction.x === 1) angle = 0;
      if (direction.x === -1) angle = Math.PI;
      if (direction.y === 1) angle = Math.PI / 2;
      if (direction.y === -1) angle = -Math.PI / 2;

      const eyeOffset = radius * 0.38;
      const eyeSpread = radius * 0.42;
      const eyeBaseX = Math.cos(angle) * eyeOffset;
      const eyeBaseY = Math.sin(angle) * eyeOffset;
      const perpX = Math.cos(angle + Math.PI / 2) * eyeSpread;
      const perpY = Math.sin(angle + Math.PI / 2) * eyeSpread;

      ctx.fillStyle = '#082311';
      [[hx + eyeBaseX + perpX * 0.55, hy + eyeBaseY + perpY * 0.55], [hx + eyeBaseX - perpX * 0.55, hy + eyeBaseY - perpY * 0.55]].forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.12, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawApple() {
      const x = apple.x * size + size / 2;
      const y = apple.y * size + size / 2;
      const r = size * 0.24;
      const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 2, x, y, r * 2);
      grad.addColorStop(0, '#ffb0bc');
      grad.addColorStop(1, '#ff5f7a');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r * 1.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#8b5a2b';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, y - r * 1.05);
      ctx.lineTo(x + 2, y - r * 1.6);
      ctx.stroke();

      ctx.fillStyle = '#84f0aa';
      ctx.beginPath();
      ctx.ellipse(x + r * 0.45, y - r * 1.2, r * 0.45, r * 0.22, -0.4, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      drawBackground();
      drawApple();
      drawSnake();
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const delta = ts - lastTime;
      lastTime = ts;

      if (running && !paused) {
        moveAccumulator += delta;
        while (moveAccumulator >= stepMs) {
          moveSnake();
          moveAccumulator -= stepMs;
          if (!running) break;
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
      if (paused) setMessage('Paused', 'Tap Resume to keep going.');
      else hideMessage();
    }

    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);
    document.querySelectorAll('[data-dir]').forEach(btn => btn.addEventListener('click', () => setDirection(btn.dataset.dir)));

    document.addEventListener('keydown', (e) => {
      const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
      if (map[e.key]) { e.preventDefault(); setDirection(map[e.key]); }
      if (e.key === ' ') { e.preventDefault(); if (!running) startGame(); else togglePause(); }
    });

    canvas.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 'right' : 'left');
      else setDirection(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    bestEl.textContent = loadBest();
    resetGame();
    setMessage('Tap Start', 'Swipe or use the arrows. Eat apples. Don’t crash.');
    requestAnimationFrame(loop);
  </script>
</body>
</html>
