<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dosa" />
  <meta name="theme-color" content="#08111f" />
  <title>Dosa</title>
  <style>
    :root {
      --bg: #07101d;
      --bg2: #0d1730;
      --panel: rgba(8, 14, 28, 0.78);
      --line: rgba(255,255,255,0.08);
      --text: #eef5ff;
      --muted: #9fb0cf;
      --green: #ff67b3;
      --green2: #e14794;
      --green3: #ffd1e8;
      --apple: #ff5d7a;
      --apple2: #ff96ac;
      --blue: #77a8ff;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(53,212,125,0.09), transparent 24%),
        radial-gradient(circle at bottom, rgba(119,168,255,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      padding: 14px;
      display: flex;
      justify-content: center;
      touch-action: manipulation;
    }
    .app { width: 100%; max-width: 470px; display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .topbar {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }
    h1 { margin: 0; font-size: 1.45rem; letter-spacing: -0.04em; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 0.92rem; }
    .stats { display: flex; gap: 10px; }
    .stat {
      min-width: 78px; padding: 10px 12px; border-radius: 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06); text-align: center;
    }
    .stat span { display: block; color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 4px; }
    .stat strong { font-size: 1.15rem; }
    .board-wrap { padding: 14px; }
    .board-shell {
      position: relative; border-radius: 26px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08); background: linear-gradient(180deg, #0b1326, #111a31);
    }
    canvas { width: 100%; display: block; aspect-ratio: 1; }
    .overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 18px; pointer-events: none;
      background: rgba(3, 8, 16, 0.18);
    }
    .overlay.hidden { display: none; }
    .message {
      width: min(88%, 340px);
      background: rgba(8, 14, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 18px;
      border-radius: 22px;
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.34);
    }
    .message strong { display: block; font-size: 1.18rem; margin-bottom: 6px; }
    .message .meta { color: var(--muted); font-size: 0.94rem; line-height: 1.45; }
    .message .big-score { font-size: 2.3rem; font-weight: 900; margin: 10px 0 6px; letter-spacing: -0.05em; }
    .message .subrow { display: flex; justify-content: center; gap: 16px; color: var(--muted); font-size: 0.92rem; margin-top: 8px; }
    .message .mini-badge {
      display: inline-block; margin-top: 10px; padding: 6px 10px; border-radius: 999px;
      background: rgba(119,168,255,0.12); color: #cfe1ff; border: 1px solid rgba(119,168,255,0.18); font-size: 0.78rem;
    }
    .controls { padding: 0 14px 14px; }
    .actions { display: flex; gap: 10px; margin-bottom: 10px; }
    button { border: 0; cursor: pointer; font: inherit; -webkit-tap-highlight-color: transparent; }
    .action { flex: 1; min-height: 52px; border-radius: 16px; font-weight: 800; transition: transform .1s ease, filter .15s ease; }
    .start { background: linear-gradient(135deg, var(--green3), var(--green)); color: #062713; }
    .pause { background: rgba(255,255,255,0.08); color: var(--text); }
    .dpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .dpad button, .dpad .empty { min-height: 60px; border-radius: 18px; }
    .dpad button {
      background: rgba(255,255,255,0.06); color: var(--text); font-size: 1.15rem; font-weight: 800;
      border: 1px solid rgba(255,255,255,0.06); transition: transform .08s ease, background .12s ease;
    }
    .dpad button:active, .action:active { transform: scale(0.98); }
    .empty { visibility: hidden; }
    .footer { padding: 0 18px 18px; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
    .badge {
      display: inline-block; padding: 6px 10px; border-radius: 999px; color: #b7ffd5;
      background: rgba(53,212,125,0.12); border: 1px solid rgba(53,212,125,0.18); font-size: 0.78rem; margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card topbar">
      <div>
        <h1>Dosa</h1>
        <div class="subtitle">The pink snake. Smoother feel, better feedback.</div>
      </div>
      <div class="stats">
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Best</span><strong id="best">0</strong></div>
      </div>
    </div>

    <div class="card board-wrap">
      <div class="board-shell">
        <canvas id="game" width="720" height="720"></canvas>
        <div class="overlay" id="overlay">
          <div class="message" id="messageBox"></div>
        </div>
      </div>
    </div>

    <div class="card controls">
      <div class="actions">
        <button class="action start" id="startBtn">Start / Restart</button>
        <button class="action pause" id="pauseBtn">Pause</button>
      </div>
      <div class="dpad">
        <div class="empty"></div>
        <button data-dir="up">▲</button>
        <div class="empty"></div>
        <button data-dir="left">◀</button>
        <button data-dir="down">▼</button>
        <button data-dir="right">▶</button>
      </div>
      <div class="footer">
        <div class="badge">Safari + Home Screen friendly</div><br>
        Swipe on the board or tap the arrows. Sound unlocks after your first tap on Start.
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const grid = 14;
    const size = canvas.width / grid;
    const bestKey = 'snakeAppleBestScoreV3';

    let snake = [];
    let direction = { x: 1, y: 0 };
    let queuedDirection = { x: 1, y: 0 };
    let apple = { x: 10, y: 10 };
    let score = 0;
    let running = false;
    let paused = false;
    let lastTime = 0;
    let moveAccumulator = 0;
    let stepMs = 140;
    let touchStartX = 0;
    let touchStartY = 0;
    let pulse = 0;
    let deathFlash = 0;
    let popEffects = [];
    let confettiPieces = [];
    let audioCtx = null;
    let audioReady = false;

    function loadBest() { return Number(localStorage.getItem(bestKey) || 0); }
    function saveBest(v) { localStorage.setItem(bestKey, String(v)); }

    function updateScore() {
      scoreEl.textContent = score;
      const best = Math.max(loadBest(), score);
      bestEl.textContent = best;
      if (best !== loadBest()) saveBest(best);
    }

    function rand(max) { return Math.floor(Math.random() * max); }

    function placeApple() {
      do {
        apple = { x: rand(grid), y: rand(grid) };
      } while (snake.some(s => s.x === apple.x && s.y === apple.y));
    }

    function showOverlay(html) {
      overlay.classList.remove('hidden');
      messageBox.innerHTML = html;
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function introMessage() {
      showOverlay(`
        <strong>Tap Start</strong>
        <div class="meta">Swipe or use the arrows. Eat apples. Don’t crash.</div>
        <div class="mini-badge">Dosa is ready.</div>
      `);
    }

    function pauseMessage() {
      showOverlay(`
        <strong>Paused</strong>
        <div class="meta">Tap Resume to keep going.</div>
      `);
    }

    function gameOverMessage() {
      const best = Math.max(loadBest(), score);
      showOverlay(`
        <strong>Game Over</strong>
        <div class="big-score">${score}</div>
        <div class="meta">Nice run. Hit Start / Restart and go again.</div>
        <div class="subrow"><span>Best: ${best}</span><span>Length: ${snake.length}</span></div>
        <div class="mini-badge">One more?</div>
      `);
    }

    function ensureAudio() {
      if (audioReady) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      audioReady = true;
    }

    function beep(type, freq, duration, gain = 0.03) {
      if (!audioReady || !audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(80, freq * 0.92), now + duration);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playEatSound() {
      beep('triangle', 760, 0.08, 0.04);
      setTimeout(() => beep('sine', 980, 0.07, 0.03), 35);
    }

    function playStartSound() {
      beep('sine', 420, 0.07, 0.03);
      setTimeout(() => beep('triangle', 640, 0.08, 0.035), 55);
    }

    function playCrashSound() {
      beep('sawtooth', 220, 0.12, 0.04);
      setTimeout(() => beep('square', 160, 0.18, 0.03), 50);
      setTimeout(() => beep('triangle', 520, 0.05, 0.02), 40);
      setTimeout(() => beep('triangle', 760, 0.06, 0.018), 90);
    }

    function spawnConfettiFromSnake() {
      const palette = ['#ff67b3', '#ffd1e8', '#ffcf5a', '#7ee7ff', '#9af7bf', '#ffffff'];
      confettiPieces = [];
      snake.forEach((part, index) => {
        const c = cellCenter(part);
        const count = index === 0 ? 16 : 8;
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.5 + Math.random() * 4.5;
          confettiPieces.push({
            x: c.x,
            y: c.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (1 + Math.random() * 2.2),
            size: 4 + Math.random() * 8,
            rot: Math.random() * Math.PI * 2,
            vr: (Math.random() - 0.5) * 0.28,
            color: palette[Math.floor(Math.random() * palette.length)],
            life: 50 + Math.random() * 22,
            age: 0
          });
        }
      });
    }

    function addPopEffect(x, y) {
      popEffects.push({ x, y, age: 0, life: 420 });
    }

    function resetGame() {
      snake = [
        { x: 5, y: 7 },
        { x: 4, y: 7 },
        { x: 3, y: 7 },
        { x: 2, y: 7 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = { x: 1, y: 0 };
      score = 0;
      stepMs = 140;
      paused = false;
      running = false;
      moveAccumulator = 0;
      deathFlash = 0;
      popEffects = [];
      confettiPieces = [];
      pauseBtn.textContent = 'Pause';
      placeApple();
      updateScore();
      draw();
    }

    function startGame() {
      ensureAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      resetGame();
      running = true;
      hideOverlay();
      playStartSound();
    }

    function endGame() {
      running = false;
      deathFlash = 1;
      spawnConfettiFromSnake();
      playCrashSound();
      gameOverMessage();
    }

    function setDirection(name) {
      const map = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };
      const next = map[name];
      if (!next) return;

      if (!running) {
        ensureAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        resetGame();
        running = true;
        hideOverlay();
        playStartSound();
      }

      if (next.x === -direction.x && next.y === -direction.y) return;
      queuedDirection = next;
    }

    function moveSnake() {
      direction = queuedDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      const hitWall = head.x < 0 || head.y < 0 || head.x >= grid || head.y >= grid;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);
      if (hitWall || hitSelf) return endGame();

      snake.unshift(head);
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        updateScore();
        addPopEffect(head.x, head.y);
        playEatSound();
        placeApple();
        stepMs = Math.max(82, stepMs - 4);
      } else {
        snake.pop();
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#091226');
      g.addColorStop(1, '#111b33');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.045)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i++) {
        const p = i * size;
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(canvas.width, p); ctx.stroke();
      }
    }

    function cellCenter(part) {
      return { x: part.x * size + size / 2, y: part.y * size + size / 2 };
    }

    function drawSnake() {
      if (!snake.length || (!running && confettiPieces.length)) return;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#24c76d';
      ctx.lineWidth = size * 0.72;
      ctx.shadowColor = 'rgba(53,212,125,0.28)';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      snake.forEach((part, i) => {
        const c = cellCenter(part);
        if (i === 0) ctx.moveTo(c.x, c.y);
        else ctx.lineTo(c.x, c.y);
      });
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#b3ffd1';
      ctx.lineWidth = size * 0.34;
      ctx.beginPath();
      snake.forEach((part, i) => {
        const c = cellCenter(part);
        if (i === 0) ctx.moveTo(c.x, c.y);
        else ctx.lineTo(c.x, c.y);
      });
      ctx.stroke();
      ctx.restore();

      const head = snake[0];
      const hx = head.x * size + size / 2;
      const hy = head.y * size + size / 2;
      const radius = size * 0.34;
      const shimmer = 1 + Math.sin(pulse * 0.01) * 0.03;
      const headGradient = ctx.createRadialGradient(hx - radius * 0.35, hy - radius * 0.35, radius * 0.15, hx, hy, radius * 1.15);
      headGradient.addColorStop(0, '#ddffe8');
      headGradient.addColorStop(1, '#31d078');
      ctx.fillStyle = headGradient;
      ctx.beginPath();
      ctx.arc(hx, hy, radius * shimmer, 0, Math.PI * 2);
      ctx.fill();

      let angle = 0;
      if (direction.x === 1) angle = 0;
      if (direction.x === -1) angle = Math.PI;
      if (direction.y === 1) angle = Math.PI / 2;
      if (direction.y === -1) angle = -Math.PI / 2;
      const eyeOffset = radius * 0.38;
      const eyeSpread = radius * 0.42;
      const eyeBaseX = Math.cos(angle) * eyeOffset;
      const eyeBaseY = Math.sin(angle) * eyeOffset;
      const perpX = Math.cos(angle + Math.PI / 2) * eyeSpread;
      const perpY = Math.sin(angle + Math.PI / 2) * eyeSpread;
      ctx.fillStyle = '#092110';
      [[hx + eyeBaseX + perpX * 0.55, hy + eyeBaseY + perpY * 0.55], [hx + eyeBaseX - perpX * 0.55, hy + eyeBaseY - perpY * 0.55]].forEach(([x, y]) => {
        ctx.beginPath(); ctx.arc(x, y, radius * 0.12, 0, Math.PI * 2); ctx.fill();
      });
    }

    function drawApple() {
      const x = apple.x * size + size / 2;
      const y = apple.y * size + size / 2;
      const r = size * 0.24;
      const glowR = r * (1.55 + Math.sin(pulse * 0.014) * 0.08);
      const glow = ctx.createRadialGradient(x, y, 0, x, y, glowR * 2);
      glow.addColorStop(0, 'rgba(255,116,144,0.22)');
      glow.addColorStop(1, 'rgba(255,116,144,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, glowR * 2, 0, Math.PI * 2); ctx.fill();

      const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 2, x, y, r * 2);
      grad.addColorStop(0, '#ffc2cc');
      grad.addColorStop(1, '#ff5f7a');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, r * 1.18, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.arc(x - r * 0.38, y - r * 0.38, r * 0.24, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#8a5e2f';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(x, y - r * 1.08); ctx.lineTo(x + 2, y - r * 1.65); ctx.stroke();
      ctx.fillStyle = '#93f7b3';
      ctx.beginPath(); ctx.ellipse(x + r * 0.46, y - r * 1.18, r * 0.44, r * 0.22, -0.4, 0, Math.PI * 2); ctx.fill();
    }

    function drawEffects(delta) {
      popEffects = popEffects.filter(effect => {
        effect.age += delta;
        const t = effect.age / effect.life;
        if (t >= 1) return false;
        const cx = effect.x * size + size / 2;
        const cy = effect.y * size + size / 2;
        const radius = 10 + t * 28;
        ctx.strokeStyle = `rgba(255,160,180,${1 - t})`;
        ctx.lineWidth = 4 * (1 - t);
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();
        return true;
      });

      confettiPieces = confettiPieces.filter(piece => {
        piece.age += delta / 16;
        if (piece.age >= piece.life) return false;
        piece.x += piece.vx;
        piece.y += piece.vy;
        piece.vy += 0.12;
        piece.vx *= 0.995;
        piece.rot += piece.vr;
        const alpha = Math.max(0, 1 - piece.age / piece.life);
        ctx.save();
        ctx.translate(piece.x, piece.y);
        ctx.rotate(piece.rot);
        ctx.fillStyle = piece.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(-piece.size / 2, -piece.size / 3, piece.size, piece.size * 0.66);
        ctx.restore();
        return piece.y < canvas.height + 30;
      });

      if (deathFlash > 0.01) {
        ctx.fillStyle = `rgba(255,90,120,${deathFlash * 0.22})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function draw(delta = 16) {
      drawBackground();
      drawApple();
      drawSnake();
      drawEffects(delta);
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const delta = ts - lastTime;
      lastTime = ts;
      pulse += delta;
      deathFlash *= 0.92;

      if (running && !paused) {
        moveAccumulator += delta;
        while (moveAccumulator >= stepMs) {
          moveSnake();
          moveAccumulator -= stepMs;
          if (!running) break;
        }
      }

      draw(delta);
      requestAnimationFrame(loop);
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
      if (paused) pauseMessage();
      else hideOverlay();
    }

    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);
    document.querySelectorAll('[data-dir]').forEach(btn => btn.addEventListener('click', () => setDirection(btn.dataset.dir)));

    document.addEventListener('keydown', (e) => {
      const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
      if (map[e.key]) { e.preventDefault(); setDirection(map[e.key]); }
      if (e.key === ' ') { e.preventDefault(); if (!running) startGame(); else togglePause(); }
    });

    canvas.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.clientX; touchStartY = t.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 'right' : 'left');
      else setDirection(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    bestEl.textContent = loadBest();
    resetGame();
    introMessage();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
